<!DOCTYPE html>
<html>
<head>
  <title>Scheduling System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th {
      background: black;
      color: white;
      padding: 10px;
    }

    td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #ddd;
      cursor: pointer;
    }

    tr:hover {
      background: #f1f1f1;
    }

    input {
      width: 100%;
      border: none;
      outline: none;
      text-align: center;
    }
  </style>
</head>

<body>

<h1>📅 Scheduling System</h1>

<table>
  <thead id="thead"></thead>
  <tbody id="tbody"></tbody>
</table>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzYWIfcUbKWh4sQzLnxA5lUpfDdXwd7-5upZSh3ysWYkVyrEWFWia238mwSk0ntyOMoqA/exec";

fetch(API_URL)
  .then(res => res.json())
  .then(data => {
    const thead = document.getElementById("thead");
    const tbody = document.getElementById("tbody");

    if (data.length === 0) return;

    const headers = Object.keys(data[0]);

    let headerRow = "<tr>";
    headers.forEach(h => headerRow += `<th>${h}</th>`);
    headerRow += "</tr>";
    thead.innerHTML = headerRow;

    data.forEach((row, rowIndex) => {
      let tr = document.createElement("tr");

      headers.forEach(h => {
        let td = document.createElement("td");
        td.innerText = row[h] || "";

        td.onclick = () => editCell(td, h, rowIndex);

        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });
  });

function editCell(td, key, rowIndex) {
  const input = document.createElement("input");
  input.value = td.innerText;

  td.innerHTML = "";
  td.appendChild(input);
  input.focus();

  input.onblur = () => {
    const newValue = input.value;
    td.innerText = newValue;

    fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        rowIndex: rowIndex,
        [key]: newValue
      })
    });
  };
}
</script>

</body>
</html>
